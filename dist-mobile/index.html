<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AutaKimi</title>
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <script type="module" crossorigin src="./assets/main-Dqq7lfcU.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-DzjdbzTx.css">
  </head>

  <body>
    <script>
      ;(function () {
        try {
          var appState = localStorage.getItem('app-storage')
          var theme = 'system'
          var colorTheme = 'default'

          if (appState) {
            var parsed = JSON.parse(appState)
            if (parsed && parsed.state) {
              theme = parsed.state.theme || 'system'
              colorTheme = parsed.state.colorTheme || 'default'
            }
          }

          var isDark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          var html = document.documentElement

          if (isDark) {
            html.classList.add('dark')
          } else {
            html.classList.remove('dark')
          }

          html.classList.remove('theme-solo-leveling', 'theme-my-hero-academia')
          if (colorTheme !== 'default') {
            html.classList.add('theme-' + colorTheme)
          }
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
  </body>
</html>
