name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop Application
        run: npm run build && npx electron-builder --win --publish never

      - name: Generate Mobile Android Project (Prebuild)
        continue-on-error: true
        id: mobile_prebuild
        run: |
          cd mobile
          npx expo prebuild --platform android --non-interactive

      - name: Generate Android APK
        continue-on-error: true
        id: mobile_build
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Publish to Public Repository
        shell: bash
        run: |
          # Define common arguments
          ARGS=(
            "${{ github.ref_name }}"
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            --repo anasx07/AutaKimi-Release
            --target main
            --title "Release ${{ github.ref_name }}"
            --notes "Automated release from private repository including Windows and optional Android builds."
          )
          
          # Add APK if it exists
          APK_PATH="mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "Adding APK to release..."
            ARGS+=("$APK_PATH")
          else
            echo "APK not found, skipping..."
          fi
          
          gh release create "${ARGS[@]}"
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}

