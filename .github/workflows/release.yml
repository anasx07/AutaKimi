name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        shell: bash
        run: npm ci

      - name: Rebuild Native Modules
        working-directory: apps/desktop
        run: npm run rebuild

      - name: Build Desktop Application
        working-directory: apps/desktop
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: Generate Mobile Android Project (Prebuild)
        continue-on-error: true
        id: mobile_prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --non-interactive

      - name: Generate Android APK
        continue-on-error: true
        id: mobile_build
        shell: bash
        run: |
          if [ -d "apps/mobile/android" ]; then
            cd apps/mobile/android
            ./gradlew assembleDebug
          else
            echo "⚠️ Android folder not found, skipping compilation."
          fi

      - name: Publish Release
        shell: bash
        run: |
          # 1. Gather Desktop Artifacts
          FILES=()
          for f in apps/desktop/dist/*.exe apps/desktop/dist/*.blockmap apps/desktop/dist/latest.yml; do
            if [ -f "$f" ]; then
              echo "✅ Found Desktop file: $f"
              FILES+=("$f")
            fi
          done
          
          # 2. Add Android APK if it exists
          APK_PATH="apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ Found Android APK: $APK_PATH"
            FILES+=("$APK_PATH")
          else
            echo "⚠️ Android APK not found."
          fi
          
          # 3. Create Release
          echo "🚀 Creating GitHub Release v${{ github.ref_name }}..."
          gh release create "${{ github.ref_name }}" "${FILES[@]}" \
            --repo ${{ github.repository }} \
            --target main \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release of AutaKimi Monorepo (Windows & Android)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
