name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build && npx electron-builder --win --publish never

      - name: Publish to Public Repository
        shell: bash
        run: |
          gh release create ${{ github.ref_name }} \
            dist/*.exe \
            dist/*.blockmap \
            dist/latest.yml \
            --repo anasx07/AutaKimi-Release \
            --target main \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release from private repository."
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
