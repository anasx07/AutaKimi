name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm ci

      - name: Rebuild Native Modules
        run: |
          cd apps/desktop
          npm run rebuild

      - name: Build Desktop Application
        run: |
          cd apps/desktop
          npm run build
          npx electron-builder --win --publish never

      - name: Generate Mobile Android Project (Prebuild)
        continue-on-error: true
        id: mobile_prebuild
        run: |
          cd apps/mobile
          npx expo prebuild --platform android --non-interactive

      - name: Generate Android APK
        continue-on-error: true
        id: mobile_build
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      - name: Publish Release
        shell: bash
        run: |
          # Create a list of files that actually exist
          FILES=()
          for f in apps/desktop/dist/*.exe apps/desktop/dist/*.blockmap apps/desktop/dist/latest.yml; do
            [ -e "$f" ] && FILES+=("$f")
          done
          
          # Add APK if it exists
          APK_PATH="apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found, adding to release."
            FILES+=("$APK_PATH")
          else
            echo "⚠️  APK not found, releasing desktop only."
          fi
          
          # Create the release
          gh release create "${{ github.ref_name }}" "${FILES[@]}" \
            --repo ${{ github.repository }} \
            --target main \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release of AutaKimi (Windows & Android)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
